<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑报2025合订本 · 交互式精华PPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .presentation-container {
            width: 1300px;
            max-width: 100%;
            background: rgba(18, 25, 40, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 144, 226, 0.3);
            border-radius: 42px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
            overflow: hidden;
            padding: 30px 35px 35px 35px;
        }

        /* 幻灯片主区域 */
        .slide-area {
            background: #0f172ab3;
            border-radius: 32px;
            padding: 40px 45px;
            border: 1px solid #2d3a5e;
            box-shadow: 0 20px 35px -10px #00000080;
            min-height: 550px;
            transition: opacity 0.3s ease;
            color: #e1e9f5;
            overflow-y: auto;
            max-height: 650px;
        }

        /* 页码指示器 + 按钮条 */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
            background: #111c2ea0;
            border-radius: 60px;
            padding: 12px 20px;
            border: 1px solid #2b416c;
            backdrop-filter: blur(8px);
        }

        .page-indicator {
            color: #a5c9ff;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: #1e2b41;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 1rem;
            border: 1px solid #3f5680;
            box-shadow: inset 0 2px 5px #00000055;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(165deg, #1f334f, #0f1b2f);
            border: 1px solid #3c6e9c;
            color: #d3e5ff;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #0a121f, 0 8px 15px #00000060;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(165deg, #2a405e, #142439);
            border-color: #5b8fd4;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0a121f, 0 12px 20px #00000080;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0a121f, 0 8px 15px #00000060;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: 0 4px 0 #0a121f;
            transform: translateY(2px);
            border-color: #2f4a6e;
        }

        /* 幻灯片内部排版 */
        .slide-title {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c0e0ff, #9bc5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            border-left: 7px solid #2f80ed;
            padding-left: 25px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px #0055ff40;
        }

        .slide-subhead {
            font-size: 1.6rem;
            color: #b2d3ff;
            margin: 20px 0 10px 0;
            font-weight: 500;
            border-bottom: 2px dashed #3e5f8a;
            padding-bottom: 8px;
        }

        .slide-content {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #ced9ed;
        }

        .bullet-list {
            list-style: none;
            margin: 15px 0;
        }

        .bullet-list li {
            margin-bottom: 10px;
            padding-left: 28px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%233b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="6"></circle><path d="M12 2v4M12 22v-4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M22 12h-4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>') left center no-repeat;
            background-size: 18px;
        }

        .highlight-box {
            background: #132237;
            border-radius: 30px;
            padding: 20px 25px;
            margin: 20px 0;
            border: 1px solid #2f6396;
            box-shadow: inset 0 5px 8px #00000033;
            color: #dcf0ff;
        }

        .tag {
            display: inline-block;
            background: #1d4ed8;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: white;
            margin-right: 10px;
            margin-bottom: 8px;
            border: 1px solid #7ab0ff;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        hr.divider {
            border: 1px solid #2e4570;
            margin: 30px 0;
        }

        /* 封面特殊样式 */
        .cover {
            text-align: center;
            padding: 30px 20px;
        }

        .cover h1 {
            font-size: 4.2rem;
            background: linear-gradient(145deg, #fff, #aad0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 30px 0 20px;
            text-shadow: 0 0 30px #0077ff;
        }

        .cover-sub {
            font-size: 2rem;
            color: #9fc5ff;
            margin-bottom: 40px;
        }

        .year-badge {
            background: #15315b;
            border-radius: 100px;
            padding: 15px 40px;
            display: inline-block;
            font-size: 1.8rem;
            font-weight: 700;
            border: 2px solid #3e81d0;
            box-shadow: 0 0 35px #0044ff;
            color: white;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .slide-title {
                font-size: 2rem;
            }
            .nav-bar {
                flex-direction: column;
                gap: 15px;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .presentation-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="presentation-container">
    <!-- 幻灯片展示区域 -->

        <!-- 动态由JavaScript填充 -->
    </div>

    <!-- 底部导航栏 -->
    <div class="nav-bar">
        <div class="page-indicator" id="pageIndicator">第 1 / 11 页</div>
        <div class="button-group">
            <button class="nav-btn" id="prevBtn" disabled>◀ 上一页</button>
            <button class="nav-btn" id="nextBtn">下一页 ▶</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 定义每一页的HTML内容 (基于之前设计的PPT结构) ----------
        const slides = [
            // 封面页
            `<div class="cover">

            // 第1页：引言

            // 第2页：主题一·AI革命 (国产AI逆袭 + 实用指南)
            `<div>

                    </div>

            </div>`,

            // 第4页：主题二·前沿科技——决定未来的力量
            `<div>
                <div class="slide-title">🔮 前沿科技 · 6G · 量子 · 芯片</div>
                <div class="grid-2">
                    <div>
                        <div class="slide-subhead">6G & 量子</div>

                            <li>国产GPU四小龙竞速IPO</li>

                            <li>谁买走了寒武纪芯片？</li>
                        </ul>
                    </div>
                </div>
            </div>`,

            // 第5页：主题二延伸——具身智能与新物种
            `<div>
                <div class="slide-title">🦾 具身智能 · 指尖革命</div>
                <div class="slide-content">
                    <div class="slide-subhead">封面专题：《智握未来 AI落地的“指尖革命”》</div>
                    <ul class="bullet-list">
                        <li>灵巧手突破：具身智能的“最后一厘米”突围</li>
                        <li>AI新物种：Nano-Banana来袭</li>
                        <li>风向标：从“炫技”到“实在干活” —— WAIC 2025</li>
                    </ul>
                    <div style="margin-top:25px; background:#0c1b2f; border-radius: 24px; padding: 20px;">
                        🤖 具身智能成为下一个爆发点，机器人正在学习“真实世界操作”。
                    </div>
                </div>
            </div>`,

            // 第6页：主题三·实用指南 —— 硬件评测与选购
            `<div>
                <div class="slide-title">🛠️ 实用指南 · 硬件/装机/选购</div>
                <div class="grid-2">
                    <div>
                        <div class="slide-subhead">热门硬件对决</div>
                        <ul class="bullet-list">
                            <li>RTX 5060 大战 ARC B580，20款游戏对比</li>
                            <li>锐龙9 9955HX 对 酷睿Ultra 9 275HX</li>
                            <li>2000元级处理器，哪颗玩游戏更强？</li>
                        </ul>
                    </div>
                    <div>
                        <div class="slide-subhead">装机方案</div>
                        <ul class="bullet-list">
                            <li>从高端到入门，多套配置方案</li>
                            <li>开年展望到年末硬件盘点</li>
                        </ul>
                    </div>
                </div>
                <div class="highlight-box" style="margin-top:10px;">
                    💻 让笔记本使用时长“超级加倍”的四个方法 · 强密码设置指南
                </div>
            </div>`,

            // 第7页：主题三延伸——生活与数码融合
            `<div>
                <div class="slide-title">📱 数码生活 · 消费/技巧/怀旧</div>
                <div class="slide-content">
                    <ul class="bullet-list">
                        <li>别死守国补了，这样买手机更划算</li>
                        <li>CCD老相机二手价飙升，技术怀旧需谨慎</li>
                        <li>拯救阉割耳机孔，手机秒变HIFI播放器</li>
                        <li>氮化镓充电站解决充电头杂乱</li>
                        <li>肉鸽+刷宝游戏攻略：就是要爽</li>
                    </ul>
                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <span class="tag">数码消费</span>
                        <span class="tag">怀旧经济</span>
                        <span class="tag">效率工具</span>
                    </div>
                </div>
            </div>`,

            // 第8页：特别策划——新能源与汽车科技
            `<div>
                <div class="slide-title">⚡ 特别策划 · 新能源与汽车科技</div>
                <div class="slide-content">
                    <div style="font-size:1.8rem; margin-bottom: 15px;">技术大爆发，2025年新能源车看什么？</div>
                    <ul class="bullet-list">
                        <li>开年重磅：技术大爆发，2025年新能源车看什么？</li>
                        <li>行业趋势：从新能源车爆发到智能化演进</li>

                    </ul>
                    <div class="highlight-box">🚗 激光雷达、超充、AI座舱——2025汽车进化论</div>
                </div>
            </div>`,

            // 第9页：结语——为什么值得收藏？
            `<div>
                <div class="slide-title">📚 结语 · 三大价值</div>
                <div class="slide-content" style="font-size:1.4rem;">
                    <div class="grid-2" style="margin-top:20px;">
                        <div style="background:#1d3557; border-radius: 30px; padding: 25px;">
                            <span style="font-size:2.5rem;">📅</span><br>
                            <strong>年鉴价值</strong> —— 记录2025科技风云，一册在手全年尽收
                        </div>
                        <div style="background:#1d3557; border-radius: 30px; padding: 25px;">
                            <span style="font-size:2.5rem;">🔧</span><br>
                            <strong>工具价值</strong> —— 可查可考，案头必备
                        </div>
                        <div style="background:#1d3557; border-radius: 30px; padding: 25px; grid-column: span 2;">
                            <span style="font-size:2.5rem;">❤️</span><br>
                            <strong>情怀价值</strong> —— 连续33年畅销，陪伴几代IT人成长

                    </div>
                    <hr class="divider" />

                </div>
            </div>`,

            // 封底页
            `<div class="cover" style="justify-content: center; display: flex; flex-direction: column; height: 100%;">
                <div style="font-size: 4rem; margin-bottom: 30px;">🙏</div>
                <div style="font-size: 3rem; background: linear-gradient(145deg,#c0d9ff, white); -webkit-background-clip: text; background-clip: text; color: transparent;">感谢聆听</div>
                <div style="margin: 40px 0; font-size: 1.8rem; color: #bdd3ff;">你心中的2025年度科技关键词是什么？</div>
                <div style="background: #0e2037; border-radius: 60px; padding: 25px; width: 80%; margin: 0 auto;">
                    📍 电脑报官方渠道及各大书店有售
                </div>
                <div style="margin-top: 50px; color: #648dc0;">《电脑报2025合订本》首批现货 · 约440页</div>
            </div>`
        ];

        // 当前索引 (0-based)
        let currentIndex = 0;
        const totalSlides = slides.length;

        // DOM元素
        const slideDisplay = document.getElementById('slideDisplay');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        // 更新显示区域和按钮状态
        function updateSlide() {
            // 更新内容
            slideDisplay.innerHTML = slides[currentIndex];

            // 更新页码指示器 (第x页/共y页)
            pageIndicator.textContent = `第 ${currentIndex + 1} / ${totalSlides} 页`;

            // 处理按钮禁用
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === totalSlides - 1);
        }

        // 事件监听
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlide();
            }
        });

        // 初始化第一页
        updateSlide();
    })();
</script>
</body>
</html>
